name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Run npm audit
        run: npm audit --audit-level=high --json > audit-report.json
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Run lint
        run: pnpm run lint

      - name: Lint OpenAPI spec
        run: pnpm run lint:api

      - name: Run tests
        run: pnpm run test

      - name: Run build
        run: pnpm run build

      - name: Run pnpm audit
        run: pnpm audit --audit-level=high --json > audit-report.json || true

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        with:
          name: audit-report
          path: audit-report.json
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 9

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'pnpm'

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Lint
      run: pnpm run lint

    - name: Type-check
      run: npx tsc --noEmit

    - name: Test
      run: pnpm test

    - name: Build
      run: pnpm run build
